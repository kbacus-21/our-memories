<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Memories 💕</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    :root{--bg:#0e0b14;--surface:rgba(255,255,255,0.04);--surface2:rgba(255,255,255,0.07);--border:rgba(255,200,220,0.12);--border-hover:rgba(255,180,200,0.3);--rose:#e8637a;--rose-dark:#c04060;--gold:#f0c8a0;--gold-dim:rgba(240,200,160,0.5);--text:#fdf0f4;--text-dim:rgba(253,240,244,0.55);--text-dimmer:rgba(253,240,244,0.3);--glass:rgba(20,12,22,0.88);--green:#4ade80;}
    *{margin:0;padding:0;box-sizing:border-box;}
    html{scroll-behavior:smooth;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(180,60,100,0.18) 0%,transparent 60%),radial-gradient(ellipse 60% 80% at 80% 80%,rgba(100,40,140,0.15) 0%,transparent 60%),radial-gradient(ellipse 50% 50% at 50% 50%,rgba(30,10,50,0.8) 0%,transparent 100%);z-index:0;pointer-events:none;}
    body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");background-size:200px 200px;opacity:0.4;z-index:0;pointer-events:none;}

    /* ── CELEBRATION ── */
    #celebration-overlay{display:none;position:fixed;inset:0;z-index:9000;align-items:center;justify-content:center;pointer-events:none;}
    #celebration-overlay.show{display:flex;}
    #celebration-overlay.clickable{pointer-events:all;}
    .celebration-bg{position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(232,99,122,0.35) 0%,rgba(180,40,80,0.2) 40%,transparent 70%);animation:celebPulse 3s ease-in-out infinite;}
    @keyframes celebPulse{0%,100%{opacity:0.7;}50%{opacity:1;}}
    .celebration-card{position:relative;z-index:1;background:rgba(15,8,20,0.92);border:1px solid rgba(232,99,122,0.5);border-radius:24px;padding:3rem 2.5rem;text-align:center;max-width:480px;width:90%;box-shadow:0 0 80px rgba(232,99,122,0.3),0 40px 80px rgba(0,0,0,0.7);backdrop-filter:blur(20px);animation:celebIn 0.6s cubic-bezier(0.34,1.56,0.64,1);}
    @keyframes celebIn{from{opacity:0;transform:scale(0.7);}to{opacity:1;transform:scale(1);}}
    .celebration-emoji{font-size:4rem;margin-bottom:1rem;animation:heartBeat 1.2s ease-in-out infinite;}
    @keyframes heartBeat{0%,100%{transform:scale(1);}50%{transform:scale(1.15);}}
    .celebration-title{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:300;color:var(--gold);margin-bottom:0.5rem;}
    .celebration-sub{color:var(--text-dim);font-size:1rem;margin-bottom:0.5rem;}
    .celebration-years{font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--rose);margin-bottom:1.5rem;}
    .celebration-close{padding:0.7rem 2rem;background:linear-gradient(135deg,var(--rose),var(--rose-dark));border:none;border-radius:50px;color:white;font-size:0.95rem;cursor:pointer;font-family:'DM Sans',sans-serif;}
    .hearts-container{position:fixed;inset:0;pointer-events:none;z-index:8999;overflow:hidden;}
    .heart-particle{position:absolute;bottom:-50px;font-size:1.5rem;animation:floatHeart linear forwards;opacity:0;}
    @keyframes floatHeart{0%{opacity:1;transform:translateY(0) rotate(0deg);}100%{opacity:0;transform:translateY(-110vh) rotate(360deg);}}

    /* ── REMINDER ── */
    #reminder-banner{display:none;position:fixed;top:0;left:0;right:0;z-index:8000;background:linear-gradient(135deg,rgba(232,99,122,0.95),rgba(192,64,96,0.95));color:white;text-align:center;padding:0.8rem 3rem;font-size:0.95rem;backdrop-filter:blur(10px);box-shadow:0 4px 20px rgba(232,99,122,0.4);animation:slideDown 0.4s ease;}
    @keyframes slideDown{from{transform:translateY(-100%);}to{transform:translateY(0);}}
    #reminder-banner.show{display:block;}
    #reminder-close{position:absolute;right:1rem;top:50%;transform:translateY(-50%);background:none;border:none;color:white;font-size:1.2rem;cursor:pointer;opacity:0.8;}

    /* ── SLIDESHOW ── */
    #slideshow-overlay{display:none;position:fixed;inset:0;z-index:7000;background:rgba(0,0,0,0.97);align-items:center;justify-content:center;flex-direction:column;gap:1.5rem;}
    #slideshow-overlay.open{display:flex;}
    #slideshow-img{max-width:85vw;max-height:70vh;object-fit:contain;border-radius:12px;box-shadow:0 30px 80px rgba(0,0,0,0.8);animation:ssIn 0.5s ease;}
    @keyframes ssIn{from{opacity:0;transform:scale(0.95);}to{opacity:1;transform:scale(1);}}
    .ss-caption{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-style:italic;color:var(--gold);text-align:center;max-width:600px;}
    .ss-controls{display:flex;gap:1rem;align-items:center;}
    .ss-btn{padding:0.6rem 1.2rem;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:50px;color:white;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;}
    .ss-btn:hover{background:rgba(232,99,122,0.4);}
    .ss-btn.active{background:var(--rose)!important;border-color:var(--rose)!important;}
    #ss-close{position:fixed;top:1.5rem;right:1.5rem;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;color:white;font-size:1.2rem;cursor:pointer;}
    #ss-close:hover{background:rgba(232,99,122,0.4);}
    .ss-counter{color:var(--text-dim);font-size:0.85rem;}

    /* ── LOGIN ── */
    #login-page{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:999;}
    .login-box{position:relative;background:rgba(15,9,22,0.92);border:1px solid var(--border-hover);border-radius:20px;padding:3.5rem 3rem;width:100%;max-width:420px;text-align:center;display:flex;flex-direction:column;gap:1.1rem;backdrop-filter:blur(20px);box-shadow:0 40px 80px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,200,220,0.1);}
    .login-box::before{content:'';position:absolute;inset:-1px;border-radius:20px;background:linear-gradient(135deg,rgba(232,99,122,0.4),transparent 50%,rgba(180,100,200,0.2));z-index:-1;pointer-events:none;}
    .login-box h1{font-family:'Cormorant Garamond',serif;font-size:2.4rem;font-weight:300;color:var(--text);}
    .login-box .subtitle{color:var(--text-dim);font-size:0.9rem;letter-spacing:0.06em;}
    .login-box input{padding:0.9rem 1.2rem;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:0.95rem;outline:none;width:100%;font-family:'DM Sans',sans-serif;transition:border-color 0.2s,background 0.2s;}
    .login-box input:focus{border-color:var(--rose);background:rgba(232,99,122,0.05);}
    .login-box input::placeholder{color:var(--text-dimmer);}
    #login-btn{padding:0.95rem;background:linear-gradient(135deg,var(--rose),var(--rose-dark));border:none;border-radius:50px;color:white;font-size:1rem;cursor:pointer;font-family:'DM Sans',sans-serif;box-shadow:0 8px 24px rgba(232,99,122,0.35);}
    #register-btn{padding:0.95rem;background:transparent;border:1px solid var(--gold-dim);border-radius:50px;color:var(--gold);font-size:0.95rem;cursor:pointer;font-family:'DM Sans',sans-serif;}
    .error{color:var(--rose);font-size:0.85rem;min-height:1.1rem;}

    /* ── NAV ── */
    nav{display:flex;align-items:center;justify-content:space-between;padding:0.7rem 1.5rem;background:var(--glass);border-bottom:1px solid var(--border);flex-wrap:wrap;gap:0.5rem;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);}
    .nav-left{display:flex;align-items:center;gap:0.8rem;}
    .nav-title{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:400;color:var(--gold);}
    .nav-links{display:flex;gap:0.4rem;flex-wrap:wrap;}
    .nav-links button{padding:0.42rem 0.9rem;background:var(--surface);border:1px solid var(--border);border-radius:50px;color:var(--text);cursor:pointer;font-size:0.82rem;font-family:'DM Sans',sans-serif;transition:all 0.2s;}
    .nav-links button:hover,.nav-links button.active-nav{background:var(--surface2);border-color:var(--border-hover);}
    #logout-btn{color:rgba(232,99,122,0.8)!important;border-color:rgba(232,99,122,0.25)!important;}
    #logout-btn:hover{background:rgba(232,99,122,0.1)!important;}

    /* ── AVATAR ── */
    .avatar-wrap{position:relative;cursor:pointer;flex-shrink:0;}
    .avatar-img{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid var(--border);display:block;transition:border-color 0.2s;}
    .avatar-placeholder{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--rose),var(--rose-dark));display:flex;align-items:center;justify-content:center;font-size:0.9rem;font-weight:600;color:white;border:2px solid var(--border);transition:border-color 0.2s;}
    .avatar-wrap:hover .avatar-img,.avatar-wrap:hover .avatar-placeholder{border-color:var(--rose);}
    .status-dot{width:10px;height:10px;border-radius:50%;border:2px solid var(--bg);position:absolute;bottom:0;right:0;}
    .status-dot.online{background:var(--green);}
    .status-dot.offline{background:#6b7280;}

    /* ── MAIN ── */
    #app-page{display:none;}
    main{max-width:1000px;margin:0 auto;padding:2.5rem 1.5rem;position:relative;z-index:1;}
    .section{display:none;animation:fadeUp 0.35s ease;}
    .section.active{display:block;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
    .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:1rem;}
    .section-header h2{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;color:var(--gold);}

    /* ── BUTTONS ── */
    .btn-rose{padding:0.8rem 1.5rem;background:linear-gradient(135deg,var(--rose),var(--rose-dark));border:none;border-radius:50px;color:white;font-size:0.9rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity 0.2s,transform 0.1s;box-shadow:0 6px 18px rgba(232,99,122,0.28);align-self:flex-start;}
    .btn-rose:hover{opacity:0.88;transform:translateY(-1px);}
    .btn-gold{padding:0.6rem 1.2rem;background:transparent;border:1px solid var(--gold-dim);border-radius:50px;color:var(--gold);font-size:0.82rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;}
    .btn-gold:hover{background:rgba(240,200,160,0.1);border-color:var(--gold);}
    .btn-danger{padding:0.5rem 1rem;background:transparent;border:1px solid rgba(232,99,122,0.3);border-radius:50px;color:rgba(232,99,122,0.8);font-size:0.8rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;}
    .btn-danger:hover{background:rgba(232,99,122,0.12);border-color:var(--rose);}

    /* ── FORMS ── */
    .add-form{display:flex;flex-direction:column;gap:0.8rem;margin-bottom:2rem;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.5rem;}
    .add-form input,.add-form textarea{padding:0.8rem 1rem;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:0.95rem;outline:none;font-family:'DM Sans',sans-serif;transition:border-color 0.2s;}
    .add-form input:focus,.add-form textarea:focus{border-color:var(--rose);}
    .add-form input::placeholder,.add-form textarea::placeholder{color:var(--text-dimmer);}
    .add-form textarea{height:90px;resize:vertical;}

    /* ── RANDOM MEMORY ── */
    .random-memory-card{background:linear-gradient(135deg,rgba(232,99,122,0.08),rgba(180,60,100,0.05));border:1px solid rgba(232,99,122,0.25);border-radius:16px;padding:1.5rem;margin-bottom:2rem;display:none;animation:fadeUp 0.4s ease;text-align:center;}
    .random-memory-card.show{display:block;}
    .random-memory-card img{width:100%;max-height:300px;object-fit:cover;border-radius:10px;margin-bottom:1rem;cursor:pointer;}
    .random-memory-label{font-size:0.75rem;color:var(--rose);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.5rem;}
    .random-memory-caption{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-style:italic;color:var(--gold);}
    .random-memory-time{font-size:0.75rem;color:var(--text-dimmer);margin-top:0.3rem;}

    /* ── ALBUMS ── */
    .albums-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:1rem;margin-bottom:2rem;}
    .album-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.5rem 1rem;text-align:center;cursor:pointer;transition:all 0.25s;position:relative;}
    .album-card:hover{border-color:var(--border-hover);background:var(--surface2);transform:translateY(-3px);}
    .album-icon{font-size:2.5rem;margin-bottom:0.6rem;}
    .album-name{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--text);margin-bottom:0.2rem;}
    .album-count{font-size:0.78rem;color:var(--text-dim);}
    .album-del{position:absolute;top:0.5rem;right:0.5rem;background:none;border:none;color:var(--text-dimmer);cursor:pointer;font-size:1rem;opacity:0;transition:opacity 0.2s;}
    .album-card:hover .album-del{opacity:1;}
    .album-back-btn{display:inline-flex;align-items:center;gap:0.4rem;padding:0.5rem 1rem;background:var(--surface);border:1px solid var(--border);border-radius:50px;color:var(--text-dim);font-size:0.85rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;margin-bottom:1.5rem;}
    .album-back-btn:hover{border-color:var(--border-hover);color:var(--text);}

    /* ── PHOTO GRID ── */
    .photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1.2rem;}
    .photo-card{border-radius:14px;overflow:hidden;border:1px solid var(--border);background:var(--surface);transition:all 0.25s;}
    .photo-card:hover{border-color:var(--border-hover);transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,0.4);}
    .photo-thumb-wrap{position:relative;aspect-ratio:4/3;overflow:hidden;cursor:pointer;}
    .photo-card img.thumb{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.4s;}
    .photo-card:hover img.thumb{transform:scale(1.04);}
    .photo-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.6) 0%,transparent 50%);opacity:0;transition:opacity 0.25s;display:flex;align-items:flex-end;padding:0.8rem;}
    .photo-card:hover .photo-overlay{opacity:1;}
    .photo-meta{padding:0.8rem 1rem 0;}
    .photo-caption-text{font-style:italic;color:var(--text);font-size:0.95rem;margin-bottom:0.3rem;}
    .photo-time{font-size:0.72rem;color:var(--text-dimmer);margin-bottom:0.6rem;}
    .photo-actions{display:flex;gap:0.4rem;padding:0 1rem 0.6rem;flex-wrap:wrap;}
    .photo-comments-section{border-top:1px solid var(--border);padding:0.8rem 1rem;}
    .comments-list{display:flex;flex-direction:column;gap:0.4rem;margin-bottom:0.6rem;max-height:120px;overflow-y:auto;}
    .comment-item{font-size:0.82rem;color:var(--text-dim);display:flex;gap:0.4rem;align-items:flex-start;}
    .comment-sender{color:var(--gold);font-size:0.78rem;white-space:nowrap;flex-shrink:0;}
    .comment-del{background:none;border:none;color:var(--text-dimmer);cursor:pointer;font-size:0.75rem;margin-left:auto;}
    .comment-del:hover{color:var(--rose);}
    .comment-input-row{display:flex;gap:0.5rem;}
    .comment-input-row input{flex:1;padding:0.45rem 0.8rem;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:50px;color:var(--text);font-size:0.82rem;outline:none;font-family:'DM Sans',sans-serif;}
    .comment-input-row input:focus{border-color:var(--rose);}
    .comment-input-row button{padding:0.4rem 0.8rem;background:var(--rose);border:none;border-radius:50px;color:white;font-size:0.8rem;cursor:pointer;}
    .edit-caption-row{display:flex;gap:0.5rem;padding:0 1rem 0.6rem;}
    .edit-caption-row input{flex:1;padding:0.4rem 0.8rem;background:rgba(255,255,255,0.05);border:1px solid var(--rose);border-radius:8px;color:var(--text);font-size:0.88rem;outline:none;font-family:'DM Sans',sans-serif;}
    .edit-caption-row button{padding:0.4rem 0.8rem;background:var(--rose);border:none;border-radius:8px;color:white;font-size:0.8rem;cursor:pointer;}

    /* ── LIGHTBOX ── */
    #lightbox{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.93);align-items:center;justify-content:center;backdrop-filter:blur(8px);padding:2rem;}
    #lightbox.open{display:flex;}
    #lightbox img{max-width:90vw;max-height:85vh;border-radius:10px;object-fit:contain;box-shadow:0 30px 80px rgba(0,0,0,0.8);}
    #lightbox-close{position:fixed;top:1.5rem;right:1.5rem;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;color:white;font-size:1.2rem;cursor:pointer;}
    #lightbox-close:hover{background:rgba(232,99,122,0.4);}

    /* ── NOTES ── */
    .notes-list{display:flex;flex-direction:column;gap:1rem;}
    .note-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.2rem 1.5rem;transition:border-color 0.2s;}
    .note-card:hover{border-color:var(--border-hover);}
    .note-card h3{font-family:'Cormorant Garamond',serif;color:var(--gold);margin-bottom:0.3rem;font-size:1.2rem;font-weight:400;}
    .note-card p{color:rgba(253,240,244,0.75);line-height:1.75;font-size:0.95rem;}
    .note-card-actions{display:flex;gap:0.4rem;margin-top:0.8rem;}
    .note-time{font-size:0.72rem;color:var(--text-dimmer);margin-bottom:0.4rem;}

    /* ── TIMELINE ── */
    .timeline-list{display:flex;flex-direction:column;gap:1rem;}
    .timeline-card{display:flex;gap:1.5rem;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.2rem 1.5rem;transition:border-color 0.2s;}
    .timeline-card:hover{border-color:var(--border-hover);}
    .timeline-date{color:var(--gold);font-size:0.85rem;white-space:nowrap;min-width:80px;}
    .timeline-body h3{font-family:'Cormorant Garamond',serif;color:var(--text);margin-bottom:0.3rem;font-size:1.1rem;font-weight:400;}
    .timeline-body p{color:var(--text-dim);font-size:0.9rem;}
    .timeline-card-actions{display:flex;gap:0.4rem;margin-top:0.6rem;}

    /* ── MESSAGES ── */
    .partner-status-bar{display:flex;align-items:center;gap:0.8rem;padding:0.7rem 1rem;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:1rem;}
    .partner-status-info{display:flex;flex-direction:column;}
    .partner-status-name{font-size:0.9rem;color:var(--text);}
    .partner-status-text{font-size:0.75rem;}
    .partner-status-text.online{color:var(--green);}
    .partner-status-text.offline{color:var(--text-dimmer);}

    .messages-list{display:flex;flex-direction:column;gap:0.6rem;margin-bottom:1.2rem;max-height:460px;overflow-y:auto;padding:1rem;background:var(--surface);border:1px solid var(--border);border-radius:16px;}
    .msg-row{display:flex;gap:0.5rem;align-items:flex-end;}
    .msg-row.mine{flex-direction:row-reverse;align-self:flex-end;max-width:78%;}
    .msg-row.theirs{flex-direction:row;align-self:flex-start;max-width:78%;}
    .msg-avatar{width:28px;height:28px;border-radius:50%;object-fit:cover;flex-shrink:0;border:1px solid var(--border);}
    .msg-avatar-placeholder{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--rose),var(--rose-dark));display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:600;color:white;flex-shrink:0;}
    .msg-bubble-wrap{display:flex;flex-direction:column;gap:0.15rem;max-width:100%;}
    .msg-row.mine .msg-bubble-wrap{align-items:flex-end;}
    .msg-row.theirs .msg-bubble-wrap{align-items:flex-start;}

    .modal-box input[type=text],.modal-box input[type=password]{padding:0.8rem 1rem;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:0.95rem;outline:none;font-family:'DM Sans',sans-serif;width:100%;}
    .modal-box input:focus{border-color:var(--rose);}
    .modal-actions{display:flex;gap:0.6rem;justify-content:flex-end;}

    /* profile preview */
    .profile-preview-wrap{display:flex;flex-direction:column;align-items:center;gap:0.8rem;}
    .profile-preview-img{width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid var(--rose);display:none;}
    .profile-preview-placeholder{width:90px;height:90px;border-radius:50%;background:linear-gradient(135deg,var(--rose),var(--rose-dark));display:flex;align-items:center;justify-content:center;font-size:2.2rem;color:white;border:3px solid var(--rose);}
    .profile-upload-label{padding:0.5rem 1.2rem;background:transparent;border:1px solid var(--gold-dim);border-radius:50px;color:var(--gold);font-size:0.82rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;text-align:center;}
    .profile-upload-label:hover{background:rgba(240,200,160,0.1);}

    ::-webkit-scrollbar{width:3px;}
    ::-webkit-scrollbar-thumb{background:rgba(232,99,122,0.4);border-radius:2px;}
  </style>
</head>
<body>

<div class="hearts-container" id="hearts-container"></div>

<!-- CELEBRATION -->
<div id="celebration-overlay">
  <div class="celebration-bg"></div>
  <div class="celebration-card">

    <div class="celebration-title" id="celeb-title"></div>

<!-- REMINDER -->
<div id="reminder-banner">

</div>

<!-- SLIDESHOW -->
<div id="slideshow-overlay">

<!-- LOGIN -->
<div id="login-page">

    <button id="login-btn">Login</button>

<!-- APP -->
<div id="app-page">
  <nav>
    <div class="nav-left">
      <!-- My avatar (clickable → profile) -->
      <div class="avatar-wrap" onclick="openProfileModal()" title="Edit profile">
        <img id="my-nav-avatar" class="avatar-img" src="" alt="" style="display:none"/>
        <div id="my-nav-placeholder" class="avatar-placeholder">?</div>
        <span class="status-dot online"></span>
      </div>
      <span class="nav-title">Our Memories 💕</span>
    </div>
    <div class="nav-links">
      <button onclick="showSection('photos')" id="nav-photos">📸 Photos</button>
      <button onclick="showSection('notes')" id="nav-notes">📝 Notes</button>
      <button onclick="showSection('timeline')" id="nav-timeline">🗓️ Timeline</button>
      <button onclick="showSection('messages')" id="nav-messages">💌 Messages</button>
      <button id="logout-btn">Logout</button>
    </div>

  <main>

    <!-- PHOTOS -->

      <div id="albums-view">

    <!-- NOTES -->
    <section id="notes" class="section">

    <!-- TIMELINE -->

      <div class="section-header"><h2>Our Timeline 🗓️</h2></div>
      <div class="add-form">
        <input type="text" id="timeline-title" placeholder="Event title"/>
        <input type="date" id="timeline-date"/>
        <input type="text" id="timeline-desc" placeholder="Description (optional)"/>
        <button class="btn-rose" onclick="addTimeline()">Add Event</button>

      <div id="timeline-list" class="timeline-list"></div>

    <!-- MESSAGES -->
    <section id="messages" class="section">
      <div class="section-header"><h2>Our Messages 💌</h2></div>
      <!-- Partner status bar -->
      <div class="partner-status-bar" id="partner-status-bar">
        <div class="avatar-wrap" style="cursor:default;">
          <img id="partner-nav-avatar" class="avatar-img" src="" alt="" style="display:none"/>
          <div id="partner-nav-placeholder" class="avatar-placeholder">?</div>
          <span class="status-dot offline" id="partner-dot"></span>
        </div>
        <div class="partner-status-info">
          <span class="partner-status-name" id="partner-status-name">...</span>
          <span class="partner-status-text offline" id="partner-status-text">Offline</span>
        </div>
      </div>
      <div id="messages-list" class="messages-list"></div>
      <div class="message-input-area">
        <div class="message-input-row">
          <input type="text" id="message-text" placeholder="Say something sweet..."/>
          <button id="record-btn" title="Click to record voice" onclick="toggleRecording()">🎙️</button>
          <button class="send-btn" onclick="sendMessage()">Send 💕</button>

        <div id="record-status" style="font-size:0.75rem;color:var(--text-dimmer);padding-left:0.5rem;">🎙️ Click mic to start recording</div>
      </div>

  </main>
</div>

<script>
// ── FIREBASE ──
const firebaseConfig = {
  apiKey: "AIzaSyCQcl8aF1RT9WuOEjaXrIBEmnLpyrCHGmU",
  authDomain: "our-memories-366ba.firebaseapp.com",
  projectId: "our-memories-366ba",
  storageBucket: "our-memories-366ba.firebasestorage.app",
  messagingSenderId: "1036976196210",
  appId: "1:1036976196210:web:959b65c01408f4bb0fd0eb"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ── CONFIG ──
const ALLOWED_USERS = {
  'kim@gmail.com': 'Kim',       // ← replace with real email
  'kyla@gmail.com': 'Kyla'      // ← replace with real email
};
const ANNIVERSARY = { month: 11, day: 1, year: 2023 };

let currentUser = null;
let currentUserName = '';
let currentAlbumId = null;
let photosUnsubscribe = null;
let allPhotos = [];
let ssIndex = 0, ssTimer = null;
let mediaRecorder = null, audioChunks = [];
let recordingTimer = null, recordingSeconds = 0;
let profilePicBase64 = null;
let onlineUnsubscribe = null;
let messagesUnsubscribe = null;

// ── AUTH ──
auth.onAuthStateChanged((user) => {
  if (user) {
    currentUser = user;
    currentUserName = ALLOWED_USERS[user.email.toLowerCase()] || user.email.split('@')[0];
    document.getElementById('login-page').style.display = 'none';
    document.getElementById('app-page').style.display = 'block';
    // set my placeholder initials
    document.getElementById('my-nav-placeholder').textContent = currentUserName.charAt(0);
    loadAll();
    checkSpecialDates();
    requestNotifPermission();
    setOnline(true);
    loadMyProfile();
    watchPartnerStatus();
    // set offline on leave
    window.addEventListener('beforeunload', () => setOnline(false));
  } else {
    currentUser = null;
    if (onlineUnsubscribe) onlineUnsubscribe();
    document.getElementById('login-page').style.display = 'flex';
    document.getElementById('app-page').style.display = 'none';
  }
});

document.getElementById('login-btn').onclick = function() {
  const email = document.getElementById('email').value.trim().toLowerCase();
  const password = document.getElementById('password').value;
  const err = document.getElementById('auth-error');
  err.textContent = '';
  if (!ALLOWED_USERS[email]) { err.textContent = 'Access denied. This is a private space. 💕'; return; }
  auth.signInWithEmailAndPassword(email, password).catch(e => { err.textContent = e.message; });
};
document.getElementById('register-btn').onclick = function() {
  const email = document.getElementById('email').value.trim().toLowerCase();
  const password = document.getElementById('password').value;
  const err = document.getElementById('auth-error');
  err.textContent = '';
  if (!ALLOWED_USERS[email]) { err.textContent = 'Registration is private. 💕'; return; }
  auth.createUserWithEmailAndPassword(email, password).catch(e => { err.textContent = e.message; });
};
document.getElementById('logout-btn').onclick = () => { setOnline(false); auth.signOut(); };

// ── NAV ──
function showSection(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(name).classList.add('active');
  document.querySelectorAll('.nav-links button').forEach(b => b.classList.remove('active-nav'));
  const nb = document.getElementById('nav-' + name);
  if (nb) nb.classList.add('active-nav');
  // mark messages as seen when opening
  if (name === 'messages') markMessagesSeen();
}

function loadAll() {
  loadAlbums(); loadNotes(); loadTimeline(); loadMessages(); fetchAllPhotos();
}

// ── ONLINE STATUS ──
function setOnline(isOnline) {
  if (!currentUser) return;
  db.collection('presence').doc(currentUser.email).set({
    online: isOnline,
    name: currentUserName,
    lastSeen: firebase.firestore.FieldValue.serverTimestamp()
  });
}

// keep online while tab is active
setInterval(() => { if (currentUser) setOnline(true); }, 30000);

function watchPartnerStatus() {
  const partnerEmail = Object.keys(ALLOWED_USERS).find(e => e !== currentUser.email.toLowerCase());
  const partnerName = ALLOWED_USERS[partnerEmail] || 'Partner';
  document.getElementById('partner-status-name').textContent = partnerName;
  document.getElementById('partner-nav-placeholder').textContent = partnerName.charAt(0);

  onlineUnsubscribe = db.collection('presence').doc(partnerEmail).onSnapshot(doc => {
    const dot = document.getElementById('partner-dot');
    const txt = document.getElementById('partner-status-text');
    if (doc.exists && doc.data().online) {
      dot.className = 'status-dot online';
      txt.textContent = '🟢 Online now';
      txt.className = 'partner-status-text online';
    } else {
      dot.className = 'status-dot offline';
      const ls = doc.exists && doc.data().lastSeen ? doc.data().lastSeen.toDate() : null;
      txt.textContent = ls ? 'Last seen ' + ls.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}) : 'Offline';
      txt.className = 'partner-status-text offline';
    }
    // load partner profile pic
    if (doc.exists && doc.data().photoUrl) {
      const img = document.getElementById('partner-nav-avatar');
      img.src = doc.data().photoUrl;
      img.style.display = 'block';
      document.getElementById('partner-nav-placeholder').style.display = 'none';
    }
  });
}

// ── PROFILE PICTURE ──
function loadMyProfile() {
  db.collection('presence').doc(currentUser.email).get().then(doc => {
    if (doc.exists && doc.data().photoUrl) {
      setNavAvatar('my', doc.data().photoUrl);
    }
  });
}

function setNavAvatar(who, url) {
  const img = document.getElementById(who + '-nav-avatar');
  const ph = document.getElementById(who + '-nav-placeholder');
  img.src = url;
  img.style.display = 'block';
  ph.style.display = 'none';
}

function openProfileModal() {
  document.getElementById('profile-modal').classList.add('open');
  profilePicBase64 = null;
  // reset preview
  document.getElementById('profile-preview-img').style.display = 'none';
  document.getElementById('profile-preview-placeholder').style.display = 'flex';
  document.getElementById('profile-preview-placeholder').textContent = currentUserName.charAt(0);
  // load existing
  db.collection('presence').doc(currentUser.email).get().then(doc => {
    if (doc.exists && doc.data().photoUrl) {
      const img = document.getElementById('profile-preview-img');
      img.src = doc.data().photoUrl;
      img.style.display = 'block';
      document.getElementById('profile-preview-placeholder').style.display = 'none';
    }
  });
}

function closeProfileModal() {
  document.getElementById('profile-modal').classList.remove('open');
  document.getElementById('profile-pic-input').value = '';
}

function previewProfilePic(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    profilePicBase64 = e.target.result;
    const img = document.getElementById('profile-preview-img');
    img.src = profilePicBase64;
    img.style.display = 'block';
    document.getElementById('profile-preview-placeholder').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

function saveProfilePic() {
  if (!profilePicBase64) { closeProfileModal(); return; }
  db.collection('presence').doc(currentUser.email).set({
    photoUrl: profilePicBase64,
    online: true,
    name: currentUserName,
    lastSeen: firebase.firestore.FieldValue.serverTimestamp()
  }, { merge: true }).then(() => {
    setNavAvatar('my', profilePicBase64);
    closeProfileModal();
  });
}

// ── SEEN RECEIPTS ──
function markMessagesSeen() {
  if (!currentUser) return;
  // mark all unread messages from partner as seen
  db.collection('messages')
    .where('sender', '!=', currentUser.email)
    .where('seen', '==', false)
    .get().then(snap => {
      const batch = db.batch();
      snap.forEach(doc => batch.update(doc.ref, { seen: true, seenAt: firebase.firestore.FieldValue.serverTimestamp() }));
      batch.commit();
    }).catch(() => {});
}

// ── SPECIAL DATES ──
function checkSpecialDates() {
  const now = new Date();
  const todayM = now.getMonth() + 1, todayD = now.getDate(), todayY = now.getFullYear();
  const annivM = ANNIVERSARY.month, annivD = ANNIVERSARY.day;
  const totalMonths = (todayY - ANNIVERSARY.year) * 12 + (todayM - ANNIVERSARY.month);
  const totalYears = todayY - ANNIVERSARY.year;
  const isAnniversary = todayM === annivM && todayD === annivD;
  const isMonthsary = todayD === annivD && !isAnniversary;
  const tomorrow = new Date(now); tomorrow.setDate(tomorrow.getDate() + 1);
  const tmM = tomorrow.getMonth() + 1, tmD = tomorrow.getDate();
  const dayBeforeAnniv = tmM === annivM && tmD === annivD;
  const dayBeforeMonthsary = tmD === annivD && !dayBeforeAnniv;

  if (isAnniversary) { showCelebration('anniversary', totalYears); launchHearts(60); sendPushNotification('💕 Happy Anniversary!', `${totalYears} years together!`); }
  else if (isMonthsary) { showCelebration('monthsary', totalMonths); launchHearts(40); sendPushNotification('🌸 Happy Monthsary!', `${totalMonths} months together!`); }
  else if (dayBeforeAnniv) { showReminder('anniversary', totalYears + 1); sendPushNotification('📅 Reminder', `Tomorrow is your anniversary! 💕`); }
  else if (dayBeforeMonthsary) { showReminder('monthsary', totalMonths + 1); sendPushNotification('📅 Reminder', `Tomorrow is your monthsary! 🌸`); }
}

function showCelebration(type, count) {
  document.getElementById('celeb-emoji').textContent = type === 'anniversary' ? '💍' : '🌸';
  document.getElementById('celeb-title').textContent = type === 'anniversary' ? 'Happy Anniversary! 💕' : 'Happy Monthsary! 🌸';
  document.getElementById('celeb-years').textContent = type === 'anniversary' ? `${count} beautiful year${count!==1?'s':''} together 🥂` : `${count} sweet month${count!==1?'s':''} together 💌`;
  document.getElementById('celebration-overlay').classList.add('show','clickable');
}
function closeCelebration() { document.getElementById('celebration-overlay').classList.remove('show','clickable'); }
function showReminder(type, count) {
  document.getElementById('reminder-text').textContent = type === 'anniversary' ? `💍 Tomorrow is your ${count}-year Anniversary! What's your plan? 💕` : `🌸 Tomorrow is your ${count}-month Monthsary! What's your plan? 💌`;
  document.getElementById('reminder-banner').classList.add('show');
  setTimeout(() => document.getElementById('reminder-banner').classList.remove('show'), 12000);
}
function closeReminder() { document.getElementById('reminder-banner').classList.remove('show'); }

function launchHearts(count) {
  const c = document.getElementById('hearts-container');
  const e = ['💕','💗','💖','💓','💞','🌸','✨','💝'];
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const h = document.createElement('div');
      h.className = 'heart-particle';
      h.textContent = e[Math.floor(Math.random()*e.length)];
      h.style.left = Math.random()*100 + 'vw';
      h.style.fontSize = (0.8+Math.random()*1.5) + 'rem';
      const d = 4+Math.random()*4;
      h.style.animation = `floatHeart ${d}s linear forwards`;
      c.appendChild(h);
      setTimeout(() => h.remove(), d*1000);
    }, i*120);
  }
}

function requestNotifPermission() { if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission(); }
function sendPushNotification(title, body) { if ('Notification' in window && Notification.permission === 'granted') new Notification(title, {body}); }

// ── LIGHTBOX ──
function openLightbox(src) { document.getElementById('lightbox-img').src = src; document.getElementById('lightbox').classList.add('open'); }
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); document.getElementById('lightbox-img').src=''; }
document.getElementById('lightbox').addEventListener('click', function(e) { if(e.target===this) closeLightbox(); });

// ── RANDOM MEMORY ──
function fetchAllPhotos() {
  db.collection('albums').get().then(albumSnap => {
    allPhotos = [];
    const ps = [];
    albumSnap.forEach(aDoc => ps.push(db.collection('albums').doc(aDoc.id).collection('photos').get().then(pSnap => pSnap.forEach(pDoc => { if(pDoc.data().url) allPhotos.push({...pDoc.data(),id:pDoc.id,albumId:aDoc.id}); }))));
    return Promise.all(ps);
  });
}

function openRandomMemory() {
  if (!allPhotos.length) { fetchAllPhotos(); setTimeout(openRandomMemory, 800); return; }
  const pick = allPhotos[Math.floor(Math.random()*allPhotos.length)];
  document.getElementById('random-memory-img').src = pick.url;
  document.getElementById('random-memory-caption').textContent = pick.caption || '(no caption)';
  const ts = pick.createdAt ? pick.createdAt.toDate() : new Date();
  document.getElementById('random-memory-time').textContent = '📅 ' + ts.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  const card = document.getElementById('random-memory-card');
  card.classList.add('show');
  card.scrollIntoView({behavior:'smooth',block:'start'});
}

// ── SLIDESHOW ──
function openSlideshow() {
  if (!allPhotos.length) { fetchAllPhotos(); setTimeout(openSlideshow, 800); return; }
  for (let i = allPhotos.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [allPhotos[i],allPhotos[j]]=[allPhotos[j],allPhotos[i]]; }
  ssIndex = 0;
  document.getElementById('slideshow-overlay').classList.add('open');
  showSlide(0);
}
function showSlide(idx) {
  if (!allPhotos.length) return;
  ssIndex = (idx+allPhotos.length)%allPhotos.length;
  const p = allPhotos[ssIndex];
  const img = document.getElementById('slideshow-img');
  img.style.animation='none'; img.offsetHeight; img.style.animation='ssIn 0.5s ease';
  img.src = p.url;
  document.getElementById('ss-caption').textContent = p.caption||'';
  document.getElementById('ss-counter').textContent = (ssIndex+1)+' / '+allPhotos.length;
}
function ssPrev() { showSlide(ssIndex-1); }
function ssNext() { showSlide(ssIndex+1); }
function toggleAutoPlay() {
  const btn = document.getElementById('ss-auto-btn');
  if (ssTimer) { clearInterval(ssTimer); ssTimer=null; btn.classList.remove('active'); btn.textContent='▶ Auto'; }
  else { ssTimer=setInterval(()=>ssNext(),3000); btn.classList.add('active'); btn.textContent='⏸ Stop'; }
}
function closeSlideshow() {
  if (ssTimer) { clearInterval(ssTimer); ssTimer=null; }
  document.getElementById('slideshow-overlay').classList.remove('open');
  document.getElementById('ss-auto-btn').classList.remove('active');
  document.getElementById('ss-auto-btn').textContent='▶ Auto';
}

// ── ALBUMS ──
function openAlbumModal() { document.getElementById('album-modal').classList.add('open'); document.getElementById('album-name-input').value=''; setTimeout(()=>document.getElementById('album-name-input').focus(),100); }
function closeAlbumModal() { document.getElementById('album-modal').classList.remove('open'); }
function createAlbum() {
  const name = document.getElementById('album-name-input').value.trim();
  if (!name) return;
  db.collection('albums').add({name, createdAt:firebase.firestore.FieldValue.serverTimestamp()}).then(closeAlbumModal);
}
function loadAlbums() {
  db.collection('albums').orderBy('createdAt','asc').onSnapshot(snap => {
    const grid = document.getElementById('albums-grid');
    grid.innerHTML = '';
    if (snap.empty) { grid.innerHTML='<p style="color:var(--text-dim);font-style:italic;grid-column:1/-1;">No albums yet. Create your first album! 💕</p>'; return; }
    const emojis = ['🌸','🌷','💐','🌺','🌻','🌹','💕','✨','🦋','🌙'];
    snap.forEach(doc => {
      const d = doc.data();
      const icon = emojis[doc.id.charCodeAt(0)%emojis.length];
      grid.innerHTML += `<div class="album-card" onclick="openAlbum('${doc.id}','${escHtml(d.name)}')">
        <button class="album-del" onclick="event.stopPropagation();deleteAlbum('${doc.id}')">✕</button>
        <div class="album-icon">${icon}</div>
        <div class="album-name">${escHtml(d.name)}</div>
        <div class="album-count" id="ac-${doc.id}">...</div>
      </div>`;
      db.collection('albums').doc(doc.id).collection('photos').get().then(ps => { const el=document.getElementById('ac-'+doc.id); if(el) el.textContent=ps.size+' photo'+(ps.size!==1?'s':''); });
    });
  });
}
function openAlbum(albumId, albumName) {
  currentAlbumId = albumId;
  document.getElementById('albums-view').style.display = 'none';
  document.getElementById('album-detail-view').style.display = 'block';
  document.getElementById('album-detail-title').textContent = albumName;
  loadPhotos(albumId);
}
function backToAlbums() {
  if (photosUnsubscribe) { photosUnsubscribe(); photosUnsubscribe=null; }
  currentAlbumId = null;
  document.getElementById('album-detail-view').style.display='none';
  document.getElementById('albums-view').style.display='block';
  document.getElementById('photo-grid').innerHTML='';
  fetchAllPhotos();
}
function deleteAlbum(albumId) {
  if (!confirm('Delete this album and all its photos?')) return;
  db.collection('albums').doc(albumId).collection('photos').get().then(snap => { const b=db.batch(); snap.forEach(d=>b.delete(d.ref)); return b.commit(); }).then(()=>db.collection('albums').doc(albumId).delete());
}

// ── PHOTOS ──
function addPhoto() {
  if (!currentAlbumId) return;
  const file = document.getElementById('photo-file').files[0];
  const caption = document.getElementById('photo-caption').value.trim();
  if (!file) { alert('Please select a photo!'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    db.collection('albums').doc(currentAlbumId).collection('photos').add({url:e.target.result,caption,uploader:currentUserName,createdAt:firebase.firestore.FieldValue.serverTimestamp()}).then(()=>{
      document.getElementById('photo-file').value='';
      document.getElementById('photo-caption').value='';
    });
  };
  reader.readAsDataURL(file);
}
function loadPhotos(albumId) {
  if (photosUnsubscribe) photosUnsubscribe();
  photosUnsubscribe = db.collection('albums').doc(albumId).collection('photos').orderBy('createdAt','desc').onSnapshot(snap => {
    const grid = document.getElementById('photo-grid');
    grid.innerHTML = '';
    if (snap.empty) { grid.innerHTML='<p style="color:var(--text-dim);font-style:italic;">No photos yet!</p>'; return; }
    snap.forEach(doc => {
      const d = doc.data();
      const ts = d.createdAt ? d.createdAt.toDate() : new Date();
      const timeStr = ts.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+' · '+ts.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
      grid.innerHTML += buildPhotoCard(doc.id,d,timeStr,albumId);
    });
    snap.forEach(doc => loadComments(albumId,doc.id));
  });
}
function buildPhotoCard(photoId,d,timeStr,albumId) {
  return `<div class="photo-card" id="pc-${photoId}">
    <div class="photo-thumb-wrap" onclick="openLightbox('${escAttr(d.url)}')">
      <img class="thumb" src="${escAttr(d.url)}" onerror="this.src='https://placehold.co/400x300?text=Photo'" alt="" loading="lazy"/>
      <div class="photo-overlay"><span style="color:white;font-size:0.8rem;">🔍 View full</span></div>
    </div>
    <div class="photo-meta">
      <div class="photo-caption-text" id="cap-${photoId}">${escHtml(d.caption||'')}</div>
      <div class="photo-time">📅 ${timeStr} · by ${escHtml(d.uploader||'')}</div>
    </div>
    <div class="photo-actions">
      <button class="btn-gold" onclick="toggleEditCaption('${photoId}')">✏️ Edit</button>
      <button class="btn-danger" onclick="deletePhoto('${albumId}','${photoId}')">🗑 Remove</button>
    </div>
    <div id="ecr-${photoId}" class="edit-caption-row" style="display:none;">
      <input type="text" id="eci-${photoId}" value="${escAttr(d.caption||'')}" placeholder="New caption"/>
      <button onclick="saveCaption('${albumId}','${photoId}')">Save</button>
    </div>
    <div class="photo-comments-section">
      <div class="comments-list" id="cml-${photoId}"></div>
      <div class="comment-input-row">
        <input type="text" id="cmi-${photoId}" placeholder="Add a comment..." onkeydown="if(event.key==='Enter')addComment('${albumId}','${photoId}')"/>
        <button onclick="addComment('${albumId}','${photoId}')">💬</button>
      </div>
    </div>
  </div>`;
}
function toggleEditCaption(photoId) {
  const row = document.getElementById('ecr-'+photoId);
  row.style.display = row.style.display==='none' ? 'flex' : 'none';
  if (row.style.display==='flex') document.getElementById('eci-'+photoId).focus();
}
function saveCaption(albumId,photoId) {
  const val = document.getElementById('eci-'+photoId).value.trim();
  db.collection('albums').doc(albumId).collection('photos').doc(photoId).update({caption:val}).then(()=>{
    document.getElementById('cap-'+photoId).textContent=val;
    document.getElementById('ecr-'+photoId).style.display='none';
  });
}
function deletePhoto(albumId,photoId) { if(!confirm('Remove this photo?')) return; db.collection('albums').doc(albumId).collection('photos').doc(photoId).delete(); }

// ── COMMENTS ──
function loadComments(albumId,photoId) {
  db.collection('albums').doc(albumId).collection('photos').doc(photoId).collection('comments').orderBy('createdAt','asc').onSnapshot(snap => {
    const list = document.getElementById('cml-'+photoId);
    if (!list) return;
    list.innerHTML = '';
    snap.forEach(cdoc => {
      const c = cdoc.data();
      const isMine = c.senderName === currentUserName;
      list.innerHTML += `<div class="comment-item"><span class="comment-sender">${escHtml(c.senderName||c.sender)}</span><span>${escHtml(c.text)}</span>${isMine?`<button class="comment-del" onclick="deleteComment('${albumId}','${photoId}','${cdoc.id}')">✕</button>`:''}</div>`;
    });
    list.scrollTop = list.scrollHeight;
  });
}
function addComment(albumId,photoId) {
  const input = document.getElementById('cmi-'+photoId);
  const text = input.value.trim();
  if (!text||!currentUser) return;
  db.collection('albums').doc(albumId).collection('photos').doc(photoId).collection('comments').add({text,sender:currentUser.email,senderName:currentUserName,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
  input.value='';
}
function deleteComment(albumId,photoId,commentId) { db.collection('albums').doc(albumId).collection('photos').doc(photoId).collection('comments').doc(commentId).delete(); }

// ── NOTES ──
function addNote() {
  const title=document.getElementById('note-title').value.trim(), body=document.getElementById('note-body').value.trim();
  if (!title&&!body) return;
  db.collection('notes').add({title,body,author:currentUserName,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
  document.getElementById('note-title').value=''; document.getElementById('note-body').value='';
}
function deleteNote(id) { if(!confirm('Delete this note?')) return; db.collection('notes').doc(id).delete(); }
function loadNotes() {
  db.collection('notes').orderBy('createdAt','desc').onSnapshot(snap => {
    const list=document.getElementById('notes-list');
    list.innerHTML='';
    if(snap.empty){list.innerHTML='<p style="color:var(--text-dim);font-style:italic;">No notes yet 📝</p>';return;}
    snap.forEach(doc=>{
      const d=doc.data(), ts=d.createdAt?d.createdAt.toDate():new Date();

// ── TIMELINE ──
function addTimeline() {
  const title=document.getElementById('timeline-title').value.trim(),date=document.getElementById('timeline-date').value,desc=document.getElementById('timeline-desc').value.trim();

function deleteTimeline(id){if(!confirm('Delete this event?'))return;db.collection('timeline').doc(id).delete();}
function loadTimeline(){

// ── MESSAGES ──
function getPartnerAvatarUrl(callback) {
  const partnerEmail = Object.keys(ALLOWED_USERS).find(e => e !== currentUser.email.toLowerCase());
  db.collection('presence').doc(partnerEmail).get().then(doc => callback(doc.exists && doc.data().photoUrl ? doc.data().photoUrl : null));
}

function sendMessage(voiceUrl) {
  if (voiceUrl) {
    if (!currentUser) return;
    db.collection('messages').add({type:'voice',audioUrl:voiceUrl,sender:currentUser.email,senderName:currentUserName,seen:false,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    return;
  }
  const text=document.getElementById('message-text').value.trim();
  if(!text||!currentUser) return;
  db.collection('messages').add({type:'text',text,sender:currentUser.email,senderName:currentUserName,seen:false,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
  document.getElementById('message-text').value='';
}

document.getElementById('message-text').addEventListener('keydown',e=>{if(e.key==='Enter')sendMessage();});

function loadMessages(){
  if (messagesUnsubscribe) messagesUnsubscribe();
  // load my profile pic for messages
  db.collection('presence').doc(currentUser.email).get().then(myDoc => {
    const myPhoto = myDoc.exists && myDoc.data().photoUrl ? myDoc.data().photoUrl : null;
    const partnerEmail = Object.keys(ALLOWED_USERS).find(e => e !== currentUser.email.toLowerCase());
    db.collection('presence').doc(partnerEmail).get().then(partnerDoc => {
      const partnerPhoto = partnerDoc.exists && partnerDoc.data().photoUrl ? partnerDoc.data().photoUrl : null;

      messagesUnsubscribe = db.collection('messages').orderBy('createdAt','asc').onSnapshot(snap=>{
        const list=document.getElementById('messages-list');
        list.innerHTML='';
        const docs = snap.docs;
        docs.forEach((doc,i)=>{
          const d=doc.data();
          const isMine=d.sender===currentUser.email;
          const ts=d.createdAt?d.createdAt.toDate():new Date();
          const timeStr=ts.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
          const photo = isMine ? myPhoto : partnerPhoto;
          const initials = (d.senderName||'?').charAt(0);

          // avatar html
          const avatarHtml = photo
            ? `<img class="msg-avatar" src="${escAttr(photo)}" alt=""/>`
            : `<div class="msg-avatar-placeholder">${escHtml(initials)}</div>`;

          // content
          let content='';
          if(d.type==='voice'&&d.audioUrl){
            content=`<div class="voice-bubble"><span>🎙️</span><audio controls src="${escAttr(d.audioUrl)}"></audio></div>`;
          } else {
            content=escHtml(d.text||'');
          }

          // seen receipt — only show on last mine message
          let seenHtml='';
          if(isMine){
            const isLast = docs.slice(i+1).every(nd=>nd.data().sender!==currentUser.email);
            if(isLast){
              seenHtml=`<div class="msg-meta"><span class="msg-time">${timeStr}</span><span class="msg-seen ${d.seen?'seen':'delivered'}">${d.seen?'✓✓ Seen':'✓ Sent'}</span></div>`;
            } else {
              seenHtml=`<div class="msg-time">${timeStr}</div>`;
            }
          } else {
            seenHtml=`<div class="msg-time">${timeStr}</div>`;
          }

          list.innerHTML+=`<div class="msg-row ${isMine?'mine':'theirs'}">
            ${avatarHtml}
            <div class="msg-bubble-wrap">
              <div class="msg-sender">${escHtml(d.senderName||d.sender)}</div>
              <div class="message-bubble ${isMine?'mine':'theirs'}">${content}</div>
              ${seenHtml}
            </div>
          </div>`;
        });
        list.scrollTop=list.scrollHeight;
        // auto-mark seen if messages section is active
        if(document.getElementById('messages').classList.contains('active')) markMessagesSeen();
      });
    });
  });
}

// ── VOICE RECORDING ──
async function toggleRecording(){
  const btn=document.getElementById('record-btn');
  const status=document.getElementById('record-status');
  if(mediaRecorder&&mediaRecorder.state==='recording'){
    mediaRecorder.stop();
    btn.classList.remove('recording');
    btn.textContent='🎙️';
    clearInterval(recordingTimer);
    status.textContent='🎙️ Click mic to start recording';
    status.style.color='var(--text-dimmer)';
  } else {
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      mediaRecorder=new MediaRecorder(stream);
      audioChunks=[];
      mediaRecorder.ondataavailable=e=>{if(e.data&&e.data.size>0)audioChunks.push(e.data);};
      mediaRecorder.onstop=()=>{
        if(!audioChunks.length)return;
        const blob=new Blob(audioChunks,{type:'audio/webm'});
        if(blob.size<500)return;
        const reader=new FileReader();
        reader.onload=()=>sendMessage(reader.result);
        reader.readAsDataURL(blob);
        stream.getTracks().forEach(t=>t.stop());
        audioChunks=[];
      };
      mediaRecorder.start(100);
      btn.classList.add('recording'); btn.textContent='⏹️';
      recordingSeconds=0;
      status.style.color='var(--rose)';
      recordingTimer=setInterval(()=>{
        recordingSeconds++;
        const m=String(Math.floor(recordingSeconds/60)).padStart(2,'0');
        const s=String(recordingSeconds%60).padStart(2,'0');
        status.textContent=`⏺️ Recording... ${m}:${s} — click ⏹️ to send`;
      },1000);
      status.textContent='⏺️ Recording... 00:00 — click ⏹️ to send';
    }catch(err){alert('Microphone access denied. Please allow mic access.');}
  }
}

function escAttr(str){return String(str||'').replace(/'/g,"\\'").replace(/"/g,'&quot;').replace(/\n/g,'').replace(/\r/g,'');}

document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeLightbox();closeSlideshow();closeCelebration();}});
